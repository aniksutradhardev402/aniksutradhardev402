name: Metrics
on:
  # Schedule updates (e.g., every 12 hours)
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below allow manual triggers and updates on push
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your secret token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: your-github-username
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Paris # Change to your timezone
          
          # Example Plugins (Turn on/off)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
