name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

        
          user: aniksutradhardev402
          template: classic
         
          base: repositories, metadata
          config_timezone: Asia/Kolkata
          
          # --- Repositories (Current & Previous) ---
          plugin_repositories: yes
          plugin_repositories_pinned: 3        
          plugin_repositories_featured:   
          plugin_forks: yes                    
          
          # --- Recent Activity ---
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr
          plugin_activity_visibility: all

          # --- Skills (Languages/Topic Badges) ---
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes        
          plugin_languages_limit: 8

          # --- Achievements Badges ---
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          
         
